apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "speclist-platform.fullname" . }}-api
  labels:
    {{- include "speclist-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "speclist-platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-speclist-runtime: {{ printf "%s/%s/api" .Values.vault.pathPrefix .Release.Namespace | quote }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.service.port }}
              name: http
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.addr | quote }}
            - name: SPECLIST_ADDR
              value: ":8080"
            - name: SPECLIST_DATA_FILE
              value: /var/lib/speclist/corpus.json
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: speclist-data
              mountPath: /var/lib/speclist
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: speclist-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
