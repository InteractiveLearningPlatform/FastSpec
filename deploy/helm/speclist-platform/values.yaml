global:
  domain: speclist.example.com

vault:
  addr: https://vault.example.internal
  role: speclist-platform
  pathPrefix: kv/data/speclist

api:
  replicaCount: 1
  image:
    repository: ghcr.io/interactivelearningplatform/fastspec/speclist-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources: {}

web:
  replicaCount: 1
  image:
    repository: ghcr.io/interactivelearningplatform/fastspec/speclist-web
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources: {}

ingress:
  className: traefik
  annotations: {}
  tls:
    enabled: true
    secretName: speclist-platform-tls
