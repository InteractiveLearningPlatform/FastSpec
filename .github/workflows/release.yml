name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fastspec-cli:
    name: Package fastspec CLI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p fastspec-cli

      - name: Archive binary
        run: |
          mkdir -p dist
          cp target/release/fastspec dist/fastspec
          tar -C dist -czf dist/fastspec-cli-linux-x86_64.tar.gz fastspec

      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: fastspec-cli-linux-x86_64
          path: dist/fastspec-cli-linux-x86_64.tar.gz

  speclist-api:
    name: Package speclist API
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/speclist-api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/speclist-api/go.mod
          cache-dependency-path: apps/speclist-api/go.mod

      - name: Build release binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -o dist/speclist-api ./cmd/speclist-api
          tar -C dist -czf dist/speclist-api-linux-x86_64.tar.gz speclist-api

      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: speclist-api-linux-x86_64
          path: apps/speclist-api/dist/speclist-api-linux-x86_64.tar.gz

  speclist-web:
    name: Package speclist web
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/speclist-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/speclist-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Archive static bundle
        run: |
          mkdir -p release
          tar -C dist -czf release/speclist-web-dist.tar.gz .

      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: speclist-web-dist
          path: apps/speclist-web/release/speclist-web-dist.tar.gz

  helm-chart:
    name: Package Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          mkdir -p dist
          helm package deploy/helm/speclist-platform --destination dist

      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: speclist-platform-helm-chart
          path: dist/*.tgz

  deploy-kubernetes:
    name: Deploy to Kubernetes
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - helm-chart
      - speclist-api
      - speclist-web
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "KUBE_CONFIG secret is required for deployment" >&2
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"

      - name: Deploy release
        run: |
          helm upgrade --install speclist-platform deploy/helm/speclist-platform \
            --namespace speclist \
            --create-namespace \
            --set global.domain=${{ vars.SPECLIST_DOMAIN }} \
            --set api.image.tag=${GITHUB_SHA} \
            --set web.image.tag=${GITHUB_SHA}

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - fastspec-cli
      - speclist-api
      - speclist-web
      - helm-chart
    permissions:
      contents: write
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
